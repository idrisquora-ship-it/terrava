name: terrava
description: Terrava — neighborhood discovery platform.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^5.2.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  permission_handler: ^12.0.0+1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  intl: any
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  sentry_flutter: ^8.14.2
  flutter_local_notifications: ^22.0.1
  google_api_headers: ^5.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Keep transitive package_info_plus compatible if a plugin lags on compileSdk.
dependency_overrides:
  package_info_plus: 8.3.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
